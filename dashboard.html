<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O2Inc · Dashboard de Horas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --green: #6CF269;
    --green-soft: rgba(108,242,105,0.12);
    --gray: #494949;
    --gray-dark: #2e2e2e;
    --gray-light: #5e5e5e;
    --gray-border: #3a3a3a;
    --white: #ffffff;
    --white-dim: rgba(255,255,255,0.6);
    --white-faint: rgba(255,255,255,0.08);
    --mono: "IBM Plex Mono", Consolas, monospace;
    --sans: "Inter", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--gray-dark); color: var(--white); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

  /* Header */
  .header { background: var(--gray); border-bottom: 1px solid var(--gray-border); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo { height: 28px; filter: brightness(0) invert(1); }
  .header-divider { width: 1px; height: 28px; background: var(--gray-border); }
  .header-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white-dim); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .refresh-badge { font-family: var(--mono); font-size: 10px; color: var(--green); background: var(--green-soft); border: 1px solid rgba(108,242,105,0.25); border-radius: 100px; padding: 4px 10px; display: flex; align-items: center; gap: 6px; }
  .refresh-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .menu-btn { position: relative; }
  .dots-btn { background: var(--white-faint); border: 1px solid var(--gray-border); color: var(--white); border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .dots-btn:hover { background: var(--gray-light); }
  .dropdown { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: var(--gray); border: 1px solid var(--gray-border); border-radius: 10px; padding: 6px; min-width: 200px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .dropdown.open { display: block; }
  .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--white); transition: background 0.12s; }
  .dropdown-item:hover { background: var(--white-faint); }

  /* Layout */
  .wrap { max-width: 1140px; margin: 0 auto; padding: 36px 40px 80px; }

  /* Seletores */
  .selectors { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; }
  .sel-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--white-dim); margin-right: 2px; }
  .sel-sep { width: 1px; height: 20px; background: var(--gray-border); margin: 0 6px; }
  .chip { font-family: var(--mono); font-size: 12px; padding: 6px 14px; border: 1px solid var(--gray-border); background: transparent; color: var(--white-dim); border-radius: 100px; cursor: pointer; transition: all 0.15s; }
  .chip:hover { border-color: var(--green); color: var(--green); }
  .chip.active { background: var(--green); border-color: var(--green); color: var(--gray-dark); font-weight: 600; }

  /* KPIs */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--gray); border: 1px solid var(--gray-border); border-radius: 12px; padding: 22px 20px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gray-border); }
  .kpi-card.highlight::before { background: var(--green); }
  .kpi-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--white-dim); margin-bottom: 10px; }
  .kpi-value { font-size: 32px; font-weight: 700; line-height: 1; }
  .kpi-card.highlight .kpi-value { color: var(--green); }
  .kpi-value .unit { font-size: 15px; font-weight: 400; color: var(--white-dim); margin-left: 3px; }
  .kpi-sub { font-size: 11px; color: var(--white-dim); margin-top: 8px; font-family: var(--mono); }

  /* Seções */
  .section { margin-bottom: 40px; }
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .section-head h2 { font-size: 15px; font-weight: 600; }
  .section-head .count { font-family: var(--mono); font-size: 10px; color: var(--white-dim); }

  /* Painéis de barras */
  .bar-panel { background: var(--gray); border: 1px solid var(--gray-border); border-radius: 12px; overflow: hidden; }
  .bar-row { display: grid; grid-template-columns: 230px 1fr 72px; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--gray-border); transition: background 0.12s; cursor: pointer; }
  .bar-row.no-click { cursor: default; }
  .bar-row:last-child { border-bottom: none; }
  .bar-row:not(.no-click):hover { background: rgba(108,242,105,0.07); }
  .bar-row:not(.no-click):hover .bar-label-text { color: var(--green); }
  .bar-label { font-size: 13px; color: var(--white); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .bar-label-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color 0.15s; }
  .click-hint { font-family: var(--mono); font-size: 9px; color: var(--green); opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .bar-row:not(.no-click):hover .click-hint { opacity: 1; }
  .bar-track { height: 6px; background: var(--gray-border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .bar-fill.accent2 { background: #3db83a; }
  .bar-value { font-family: var(--mono); font-size: 12px; text-align: right; color: var(--green); }

  /* Tabela colaboradores */
  .table-panel { background: var(--gray); border: 1px solid var(--gray-border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--white-dim); text-align: left; padding: 14px 20px; border-bottom: 1px solid var(--gray-border); background: rgba(0,0,0,0.15); }
  thead th.num { text-align: right; }
  tbody td { padding: 14px 20px; border-bottom: 1px solid var(--gray-border); font-size: 13.5px; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--white-faint); }
  tbody td.num { text-align: right; font-family: var(--mono); font-size: 13px; }
  .name-cell { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--green-soft); border: 1px solid var(--green); color: var(--green); font-family: var(--mono); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pct-bar { display: inline-block; width: 48px; height: 4px; background: var(--gray-border); border-radius: 2px; overflow: hidden; margin-left: 8px; vertical-align: middle; }
  .pct-fill { height: 100%; background: var(--green); border-radius: 2px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--gray); border: 1px solid var(--gray-border); border-radius: 16px; width: 100%; max-width: 860px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1} }
  .modal-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--gray-border); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .modal-eyebrow { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--green); margin-bottom: 6px; }
  .modal-title { font-size: 18px; font-weight: 700; line-height: 1.3; }
  .modal-total { font-family: var(--mono); font-size: 11px; color: var(--white-dim); margin-top: 4px; }
  .modal-close { background: var(--white-faint); border: 1px solid var(--gray-border); color: var(--white); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .modal-close:hover { background: var(--gray-light); }
  .modal-body { padding: 24px 28px 28px; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px; }
  .chart-box { background: rgba(0,0,0,0.2); border: 1px solid var(--gray-border); border-radius: 12px; padding: 20px; }
  .chart-box h3 { font-size: 11px; font-weight: 600; color: var(--white-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); margin-bottom: 16px; }
  .chart-box canvas { max-height: 200px; }
  .modal-table { background: rgba(0,0,0,0.2); border: 1px solid var(--gray-border); border-radius: 12px; overflow: hidden; }
  .modal-table-head { display: grid; grid-template-columns: 1fr 100px 100px; padding: 12px 20px; border-bottom: 1px solid var(--gray-border); }
  .modal-table-head span { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--white-dim); }
  .modal-table-head span:not(:first-child) { text-align: right; }
  .modal-table-row { display: grid; grid-template-columns: 1fr 100px 100px; padding: 12px 20px; border-bottom: 1px solid var(--gray-border); font-size: 13px; }
  .modal-table-row:last-child { border-bottom: none; }
  .modal-table-row span:first-child { color: var(--white-dim); }
  .modal-table-row span:not(:first-child) { text-align: right; font-family: var(--mono); font-size: 12px; color: var(--green); }

  /* Empty / Toast */
  .empty { text-align: center; padding: 60px 20px; color: var(--white-dim); font-family: var(--mono); font-size: 12px; background: var(--gray); border: 1px solid var(--gray-border); border-radius: 12px; }
  .empty strong { display: block; font-size: 16px; font-family: var(--sans); color: var(--white); font-weight: 600; margin-bottom: 8px; }
  code { background: var(--green-soft); color: var(--green); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 11px; }
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--green); color: var(--gray-dark); font-family: var(--mono); font-size: 12px; font-weight: 600; padding: 12px 20px; border-radius: 8px; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 700px) {
    .kpi-row { grid-template-columns: 1fr 1fr; }
    .bar-row { grid-template-columns: 110px 1fr 52px; gap: 8px; }
    .charts-grid { grid-template-columns: 1fr; }
    .wrap { padding: 24px 16px 60px; }
    .header { padding: 0 16px; }
  }
</style>
</head>

<script>
const SHEETJS = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
let xlsxLoaded = false;
function loadXLSX(cb) {
  if (xlsxLoaded) { cb(); return; }
  const s = document.createElement("script"); s.src = SHEETJS;
  s.onload = () => { xlsxLoaded = true; cb(); };
  document.head.appendChild(s);
}

let DADOS = null, anoSel = null, mesSel = null;
let chartMeses = null, chartPizza = null;
const MESES = {"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};
const CORES = ["#6CF269","#3db83a","#a8f5a6","#1e7a1c","#c8fac7","#8af087","#52d94f","#0d4d0c"];

function tipoServico(nomeProj) {
  const partes = nomeProj.split("—");
  return partes.length > 1 ? partes.slice(1).join("—").trim() : nomeProj.trim();
}

function clienteNome(nomeProj) {
  const partes = nomeProj.split("—");
  return partes[0].trim();
}

async function carregar() {
  try {
    const r = await fetch("dados.json?" + Date.now());
    if (!r.ok) throw new Error();
    DADOS = await r.json();
    inicializar();
  } catch {
    document.getElementById("content").innerHTML = `<div class="empty"><strong>Nenhum dado carregado</strong>Rode <code>buscar_dados_clockify.py</code> na pasta e recarregue a página.</div>`;
  }
}

function inicializar() {
  const anos = Object.keys(DADOS.dados).sort();
  anoSel = anos[anos.length - 1];
  const meses = Object.keys(DADOS.dados[anoSel]).sort();
  mesSel = meses[meses.length - 1];
  renderSeletores(); renderConteudo();
}

function renderSeletores() {
  const anos = Object.keys(DADOS.dados).sort();
  const meses = Object.keys(DADOS.dados[anoSel] || {}).sort();
  let h = "<span class=\"sel-label\">Ano</span>";
  anos.forEach(a => h += `<button class="chip ${a===anoSel?"active":""}" onclick="selAno(\'${a}\')">${a}</button>`);
  h += "<div class=\"sel-sep\"></div><span class=\"sel-label\">Mês</span>";
  meses.forEach(m => h += `<button class="chip ${m===mesSel?"active":""}" onclick="selMes(\'${m}\')">${MESES[m]||m}</button>`);
  document.getElementById("selectors").innerHTML = h;
}

function selAno(a) { anoSel=a; const ms=Object.keys(DADOS.dados[a]).sort(); mesSel=ms[ms.length-1]; renderSeletores(); renderConteudo(); }
function selMes(m) { mesSel=m; renderSeletores(); renderConteudo(); }
function iniciais(n) { return n.split(" ").filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join(""); }

function agruparPorTipo(projetos) {
  const mapa = {};
  projetos.forEach(p => {
    const tipo = tipoServico(p.nome);
    mapa[tipo] = (mapa[tipo]||0) + p.horas;
  });
  return Object.entries(mapa).map(([nome,horas])=>({nome,horas})).sort((a,b)=>b.horas-a.horas);
}

function renderConteudo() {
  const b = DADOS.dados[anoSel]?.[mesSel];
  if (!b) { document.getElementById("content").innerHTML=`<div class="empty"><strong>Sem dados neste período</strong>Escolha outro mês ou ano.</div>`; return; }

  const totalH=b.total_horas||0, totalF=b.total_faturavel||0;
  const pct=totalH>0?Math.round((totalF/totalH)*100):0;
  const tiposServico = agruparPorTipo(b.por_projeto);
  const maxProj=Math.max(1,...b.por_projeto.map(p=>p.horas));
  const maxTipo=Math.max(1,...tiposServico.map(t=>t.horas));
  const maxColab=Math.max(1,...b.por_colaborador.map(c=>c.total));

  let h = "";

  // KPIs — agora com 4 cards incluindo tipos de serviço
  h += `<div class="kpi-row">
    <div class="kpi-card highlight"><div class="kpi-label">Horas totais</div><div class="kpi-value">${totalH.toLocaleString("pt-BR")}<span class="unit">h</span></div><div class="kpi-sub">${b.por_colaborador.length} colaborador(es)</div></div>
    <div class="kpi-card"><div class="kpi-label">Taxa faturável</div><div class="kpi-value">${pct}<span class="unit">%</span></div><div class="kpi-sub">${totalF.toLocaleString("pt-BR")}h de ${totalH.toLocaleString("pt-BR")}h</div></div>
    <div class="kpi-card"><div class="kpi-label">Projetos ativos</div><div class="kpi-value">${b.por_projeto.length}</div><div class="kpi-sub">com horas lançadas</div></div>
    <div class="kpi-card"><div class="kpi-label">Tipos de serviço</div><div class="kpi-value">${tiposServico.length}</div><div class="kpi-sub">categorias distintas</div></div>
  </div>`;

  // Seção 1 — Por tipo de serviço
  h += `<div class="section"><div class="section-head"><h2>Horas por Tipo de Serviço</h2><span class="count">${tiposServico.length} tipo(s)</span></div><div class="bar-panel">`;
  tiposServico.forEach(t => {
    const pct=(t.horas/maxTipo)*100;
    h += `<div class="bar-row" onclick="abrirModalTipo(\'${encodeURIComponent(t.nome)}\')">
      <div class="bar-label"><span class="bar-label-text" title="${t.nome}">${t.nome}</span><span class="click-hint">↗ detalhes</span></div>
      <div class="bar-track"><div class="bar-fill accent2" style="width:${pct}%"></div></div>
      <div class="bar-value">${t.horas.toLocaleString("pt-BR")}h</div>
    </div>`;
  });
  h += `</div></div>`;

  // Seção 2 — Por projeto/cliente
  h += `<div class="section"><div class="section-head"><h2>Horas por Projeto / Cliente</h2><span class="count">${b.por_projeto.length} projeto(s) · clique para detalhes</span></div><div class="bar-panel">`;
  b.por_projeto.forEach(p => {
    const pct=(p.horas/maxProj)*100;
    h += `<div class="bar-row" onclick="abrirModalProjeto(\'${encodeURIComponent(p.nome)}\')">
      <div class="bar-label"><span class="bar-label-text" title="${p.nome}">${p.nome}</span><span class="click-hint">↗ detalhes</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-value">${p.horas.toLocaleString("pt-BR")}h</div>
    </div>`;
  });
  h += `</div></div>`;

  // Seção 3 — Por colaborador
  h += `<div class="section"><div class="section-head"><h2>Produtividade por Colaborador</h2><span class="count">${b.por_colaborador.length} pessoa(s)</span></div><div class="table-panel"><table><thead><tr><th>Colaborador</th><th class="num">Lançamentos</th><th class="num">Faturável</th><th class="num">Não faturável</th><th class="num">Total</th></tr></thead><tbody>`;
  b.por_colaborador.forEach(c => {
    const pBar=(c.total/maxColab)*100;
    h += `<tr><td><div class="name-cell"><div class="avatar">${iniciais(c.nome)}</div>${c.nome}</div></td><td class="num">${c.entradas}</td><td class="num">${c.faturavel.toLocaleString("pt-BR")}h</td><td class="num">${c.nao_faturavel.toLocaleString("pt-BR")}h</td><td class="num">${c.total.toLocaleString("pt-BR")}h<span class="pct-bar"><span class="pct-fill" style="width:${pBar}%"></span></span></td></tr>`;
  });
  h += `</tbody></table></div></div>`;

  document.getElementById("content").innerHTML = h;
}

// ── Modal por PROJETO ──
function abrirModalProjeto(nomeEnc) {
  const nome = decodeURIComponent(nomeEnc);
  const horasPorMes = {}, horasPorColab = {};
  let total = 0;
  Object.keys(DADOS.dados).sort().forEach(ano => {
    Object.keys(DADOS.dados[ano]).sort().forEach(mes => {
      const b = DADOS.dados[ano][mes];
      const p = b.por_projeto.find(x => x.nome === nome);
      if (!p) return;
      const chave = `${MESES[mes]||mes}/${ano}`;
      horasPorMes[chave] = (horasPorMes[chave]||0) + p.horas;
      total += p.horas;
      b.por_colaborador.forEach(c => {
        const est = b.total_horas > 0 ? Math.round(p.horas * (c.total/b.total_horas) * 100)/100 : 0;
        if (est > 0) horasPorColab[c.nome] = (horasPorColab[c.nome]||0) + est;
      });
    });
  });
  document.getElementById("modal-eyebrow").textContent = "Detalhes do Projeto";
  abrirModalComDados(nome, total, horasPorMes, horasPorColab, "Mês");
}

// ── Modal por TIPO DE SERVIÇO ──
function abrirModalTipo(tipoEnc) {
  const tipo = decodeURIComponent(tipoEnc);
  const horasPorMes = {}, horasPorColab = {};
  let total = 0;
  Object.keys(DADOS.dados).sort().forEach(ano => {
    Object.keys(DADOS.dados[ano]).sort().forEach(mes => {
      const b = DADOS.dados[ano][mes];
      const projsTipo = b.por_projeto.filter(p => tipoServico(p.nome) === tipo);
      if (!projsTipo.length) return;
      const horasMes = projsTipo.reduce((s,p)=>s+p.horas,0);
      const chave = `${MESES[mes]||mes}/${ano}`;
      horasPorMes[chave] = (horasPorMes[chave]||0) + horasMes;
      total += horasMes;
      b.por_colaborador.forEach(c => {
        const est = b.total_horas > 0 ? Math.round(horasMes * (c.total/b.total_horas) * 100)/100 : 0;
        if (est > 0) horasPorColab[c.nome] = (horasPorColab[c.nome]||0) + est;
      });
    });
  });
  document.getElementById("modal-eyebrow").textContent = "Tipo de Serviço";
  abrirModalComDados(tipo, total, horasPorMes, horasPorColab, "Mês");
}

function abrirModalComDados(titulo, total, horasPorMes, horasPorColab, labelTabela) {
  document.getElementById("modal-nome").textContent = titulo;
  document.getElementById("modal-total").textContent = `Total: ${total.toLocaleString("pt-BR")}h`;

  if (chartMeses) { chartMeses.destroy(); chartMeses = null; }
  if (chartPizza) { chartPizza.destroy(); chartPizza = null; }

  const labMeses = Object.keys(horasPorMes);
  const valMeses = Object.values(horasPorMes);
  chartMeses = new Chart(document.getElementById("chart-meses"), {
    type: "bar",
    data: { labels: labMeses, datasets: [{ data: valMeses, backgroundColor: "rgba(108,242,105,0.8)", borderColor: "#6CF269", borderWidth: 1, borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: {
      x: { ticks: { color: "rgba(255,255,255,0.5)", font:{size:10} }, grid: { color: "rgba(255,255,255,0.05)" } },
      y: { ticks: { color: "rgba(255,255,255,0.5)", font:{size:10} }, grid: { color: "rgba(255,255,255,0.05)" }, beginAtZero: true }
    }}
  });

  const labColab = Object.keys(horasPorColab);
  const valColab = Object.values(horasPorColab);
  chartPizza = new Chart(document.getElementById("chart-pizza"), {
    type: "doughnut",
    data: { labels: labColab, datasets: [{ data: valColab, backgroundColor: CORES.slice(0,labColab.length), borderColor: "#2e2e2e", borderWidth: 2 }] },
    options: { responsive: true, plugins: { legend: { position: "bottom", labels: { color: "rgba(255,255,255,0.7)", font:{size:11}, padding:12 } } } }
  });

  let tbl = `<div class="modal-table-head"><span>${labelTabela}</span><span>Horas</span><span>% do total</span></div>`;
  labMeses.forEach(m => {
    const h = horasPorMes[m];
    const p = total > 0 ? Math.round((h/total)*100) : 0;
    tbl += `<div class="modal-table-row"><span>${m}</span><span>${h.toLocaleString("pt-BR")}h</span><span>${p}%</span></div>`;
  });
  document.getElementById("modal-table").innerHTML = tbl;
  document.getElementById("modal-overlay").classList.add("open");
}

function fecharModal(e) { if (e.target===document.getElementById("modal-overlay")) fecharModalBtn(); }
function fecharModalBtn() { document.getElementById("modal-overlay").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key==="Escape") fecharModalBtn(); });

function toggleMenu() { document.getElementById("dropdown").classList.toggle("open"); }
document.addEventListener("click", e => { if (!e.target.closest(".menu-btn")) document.getElementById("dropdown").classList.remove("open"); });

function showToast(msg) {
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

function exportarExcel() {
  document.getElementById("dropdown").classList.remove("open");
  const b=DADOS?.dados[anoSel]?.[mesSel];
  if(!b){showToast("Sem dados para exportar");return;}
  loadXLSX(()=>{
    const wb=XLSX.utils.book_new(), mes=MESES[mesSel]||mesSel;
    const tipos=agruparPorTipo(b.por_projeto);
    const ws0=XLSX.utils.aoa_to_sheet([["Tipo de Serviço","Horas"],...tipos.map(t=>[t.nome,t.horas]),[],["TOTAL",b.total_horas]]);
    ws0["!cols"]=[{wch:36},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws0,"Tipo de Serviço");
    const ws1=XLSX.utils.aoa_to_sheet([["Projeto / Cliente","Horas"],...b.por_projeto.map(p=>[p.nome,p.horas]),[],["TOTAL",b.total_horas]]);
    ws1["!cols"]=[{wch:44},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws1,"Projetos");
    const ws2=XLSX.utils.aoa_to_sheet([["Colaborador","Lançamentos","Faturável (h)","Não Faturável (h)","Total (h)"],...b.por_colaborador.map(c=>[c.nome,c.entradas,c.faturavel,c.nao_faturavel,c.total]),[],["TOTAL","",b.total_faturavel,b.total_nao_faturavel,b.total_horas]]);
    ws2["!cols"]=[{wch:28},{wch:14},{wch:16},{wch:18},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,"Colaboradores");
    const ws3=XLSX.utils.aoa_to_sheet([["Workspace",DADOS.workspace],["Período",`${mes} / ${anoSel}`],["Gerado em",new Date().toLocaleString("pt-BR")],[],["KPI","Valor"],["Horas Totais",b.total_horas],["Horas Faturáveis",b.total_faturavel],["Não Faturáveis",b.total_nao_faturavel],["Taxa Faturável (%)",b.total_horas>0?Math.round((b.total_faturavel/b.total_horas)*100):0],["Projetos Ativos",b.por_projeto.length],["Tipos de Serviço",tipos.length],["Colaboradores",b.por_colaborador.length]]);
    ws3["!cols"]=[{wch:26},{wch:22}];
    XLSX.utils.book_append_sheet(wb,ws3,"Resumo");
    XLSX.writeFile(wb,`O2Inc_Horas_${mes}_${anoSel}.xlsx`);
    showToast("Excel exportado com sucesso!");
  });
}

function exportarCSV() {
  document.getElementById("dropdown").classList.remove("open");
  const b=DADOS?.dados[anoSel]?.[mesSel];
  if(!b){showToast("Sem dados");return;}
  const linhas=["Colaborador,Lançamentos,Faturável (h),Não Faturável (h),Total (h)",...b.por_colaborador.map(c=>`"${c.nome}",${c.entradas},${c.faturavel},${c.nao_faturavel},${c.total}`)];
  const blob=new Blob([linhas.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`O2Inc_Horas_${MESES[mesSel]||mesSel}_${anoSel}.csv`; a.click();
  showToast("CSV exportado!");
}

let minutos=60;
setInterval(()=>{ minutos--; if(minutos<=0){minutos=60;carregar();showToast("Dados atualizados!");} document.getElementById("next-refresh").textContent=`atualizando em ${minutos}min`; },60000);

carregar();
</script>
